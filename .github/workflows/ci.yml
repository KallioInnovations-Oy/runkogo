name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: |
          go vet ./...
          cd example && go vet ./...

      - name: Test with race detector
        run: go test -v -count=1 -race ./...

      - name: Build example
        run: cd example && go build -o /dev/null .

      - name: Build Linux binary
        run: cd example && GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null .
